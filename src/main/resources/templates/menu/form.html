<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Menüelem szerkesztése' : 'Új menüelem hozzáadása'">Menüelem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f7f7f7; }
        .form-card {
            max-width: 900px;
            margin: 40px auto;
            border-radius: 0;
        }
        .preview-img {
            max-height: 220px;
            object-fit: cover;
            width: 100%;
            border: 1px solid #ddd;
            background: #fff;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow-sm form-card">
        <div class="card-body p-4">
        		<h1 class="h4 mb-4" th:text="${isEdit} ? 'Menüelem szerkesztése' : 'Új menüelem hozzáadása'">
    				Menüelem
				</h1>
        
				<form th:action="${isEdit == true} ? @{/menu/edit/{id}(id=${itemId})} : @{/menu/add}"
      					th:object="${itemForm}"
      					method="post"
      					enctype="multipart/form-data">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Név</label>
                        <input type="text" th:field="*{name}" class="form-control">
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Kategória</label>
                        <select th:field="*{categoryId}" class="form-select">
                            <option value="">-- Válassz kategóriát --</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}">
                            </option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Leírás</label>
                        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Összetevők</label>
                        <textarea th:field="*{ingredients}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Allergének</label>
                        <textarea th:field="*{allergens}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Ár (Ft)</label>
                        <input type="number" th:field="*{price}" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Kalória</label>
                        <input type="number" th:field="*{calories}" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Elkészítési idő (perc)</label>
                        <input type="number" th:field="*{prepTimeMinutes}" class="form-control">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Kép feltöltése</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>

                    <div class="col-12" th:if="${isEdit == true and currentImagePath != null and !#strings.isEmpty(currentImagePath)}">
                        <label class="form-label">Jelenlegi kép</label>
                        <div>
                            <img th:src="@{${currentImagePath}}" class="preview-img" alt="Jelenlegi kép">
                        </div>
                        <small class="text-muted">Ha új képet töltesz fel, a régi automatikusan törlődik.</small>
                    </div>

                    <div class="col-md-3 form-check">
                        <input type="checkbox" th:field="*{vegetarian}" class="form-check-input">
                        <label class="form-check-label">Vegetáriánus</label>
                    </div>

                    <div class="col-md-3 form-check">
                        <input type="checkbox" th:field="*{vegan}" class="form-check-input">
                        <label class="form-check-label">Vegán</label>
                    </div>

                    <div class="col-md-3 form-check">
                        <input type="checkbox" th:field="*{spicy}" class="form-check-input">
                        <label class="form-check-label">Csípős</label>
                    </div>

                    <div class="col-md-3 form-check">
                        <input type="checkbox" th:field="*{available}" class="form-check-input">
                        <label class="form-check-label">Elérhető</label>
                    </div>

                    <div class="col-12 d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success">
                            <span th:text="${isEdit} ? 'Módosítás mentése' : 'Mentés'">Mentés</span>
                        </button>
                        <a th:href="@{/menu}" class="btn btn-secondary">Vissza</a>
                    </div>

                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
