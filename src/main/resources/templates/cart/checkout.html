<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Fizetés</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f7f7f7; }
    .checkout-img {
      width: 72px;
      height: 56px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #fff;
    }
    .summary-card { position: sticky; top: 16px; }
    .paypal-box {
      min-height: 52px;
      border-radius: 14px;
      background: #fff;
      padding: 8px;
      border: 1px solid #e9ecef;
    }
    .field-hint {
      font-size: .875rem;
      color: #6c757d;
    }
  </style>
</head>
<body>
<div th:replace="fragments/header :: siteHeader"></div>

<div class="container py-4">
  <h1 class="mb-4">Rendelés véglegesítése</h1>

  <div class="row g-4">
    <div class="col-lg-7">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h4 class="mb-3">A kosár tartalma</h4>

          <div class="list-group">
            <div class="list-group-item" th:each="item : ${items}">
              <div class="d-flex gap-3 align-items-center">
                <img th:if="${item.imagePath != null and !#strings.isEmpty(item.imagePath)}"
                     th:src="@{${item.imagePath}}" class="checkout-img" alt="kép">
                <div th:if="${item.imagePath == null or #strings.isEmpty(item.imagePath)}"
                     class="checkout-img d-flex align-items-center justify-content-center bg-light text-muted">
                  Nincs kép
                </div>

                <div class="flex-grow-1">
                  <div class="fw-bold" th:text="${item.name}">Név</div>
                  <div class="text-muted small mb-1"
     th:if="${item.categoryName != null and item.categoryName != 'Heti menü'}"
     th:text="${item.categoryName}">Kategória</div>
                  <div th:if="${item.categoryName != null and item.categoryName == 'Heti menü'}"
     				  th:utext="${item.description}">
				  </div>

				  <div th:unless="${item.categoryName != null and item.categoryName == 'Heti menü'}"
    				 th:text="${item.description}">
				  </div>
                </div>

                <div class="text-end">
                  <div class="fw-semibold" th:text="${item.unitPrice} + ' Ft'">0 Ft</div>
                  <div class="small text-muted" th:text="'x ' + ${item.quantity}">x 1</div>
                  <div class="small fw-bold" th:text="${item.lineTotal} + ' Ft'">0 Ft</div>
                </div>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end mt-3">
            <div class="fs-4 fw-bold">
              Összesen: <span th:text="${total} + ' Ft'">0 Ft</span>
            </div>
          </div>
        </div>
      </div>

      <form id="checkoutForm"
            th:action="@{/checkout/place-order}"
            th:object="${checkoutForm}"
            method="post"
            class="card shadow-sm">
        <div class="card-body">
          <h4 class="mb-3">Szállítási és fizetési adatok</h4>

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Név</label>
              <input type="text" th:field="*{fullName}" class="form-control" autocomplete="name">
              <div class="text-danger small" th:errors="*{fullName}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Telefonszám</label>
              <input type="tel"
                     id="phoneField"
                     th:field="*{phone}"
                     class="form-control"
                     autocomplete="tel"
                     inputmode="tel">
              <div id="phoneLiveError" class="text-danger small"></div>
              <div class="text-danger small" th:errors="*{phone}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email"
                     id="emailField"
                     th:field="*{email}"
                     class="form-control"
                     autocomplete="email"
                     placeholder="test@example.com">
              <div id="emailLiveError" class="text-danger small"></div>
              <div class="text-danger small" th:errors="*{email}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Kért időpont</label>
              <input type="text" th:field="*{desiredTime}" class="form-control" placeholder="pl. 18:30">
            </div>

            <div class="col-12">
              <label class="form-label d-block">Átvételi mód</label>
              <div class="d-flex flex-wrap gap-3">
                <label class="form-check">
                  <input class="form-check-input" type="radio" th:field="*{deliveryType}" value="TAKEAWAY">
                  <span class="form-check-label">Helyben átvétel</span>
                </label>
                <label class="form-check">
                  <input class="form-check-input" type="radio" th:field="*{deliveryType}" value="DELIVERY">
                  <span class="form-check-label">Házhozszállítás</span>
                </label>
              </div>
            </div>

            <div class="col-12" id="addressWrap" style="display:none;">
              <label class="form-label">Szállítási cím</label>
              <input type="text"
                     id="addressField"
                     th:field="*{address}"
                     class="form-control"
                     placeholder="1234 Budapest, Fő utca 1."
                     autocomplete="street-address">
              <div class="field-hint">Példa: 1234 Budapest, Fő utca 1.</div>
              <div id="addressLiveError" class="text-danger small"></div>
              <div class="text-danger small" th:errors="*{address}"></div>
            </div>

            <div class="col-12">
              <label class="form-label">Megjegyzés</label>
              <textarea th:field="*{notes}" class="form-control" rows="3"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label d-block">Fizetési mód</label>
              <div class="d-flex flex-wrap gap-3">
                <label class="form-check">
                  <input class="form-check-input payment-method" type="radio" th:field="*{paymentMethod}" value="CASH">
                  <span class="form-check-label">Készpénz átvételkor</span>
                </label>
                <label class="form-check">
                  <input class="form-check-input payment-method" type="radio" th:field="*{paymentMethod}" value="CARD">
                  <span class="form-check-label">Bankkártya átvételkor</span>
                </label>
                <label class="form-check">
                  <input class="form-check-input payment-method" type="radio" th:field="*{paymentMethod}" value="PAYPAL">
                  <span class="form-check-label">PayPal online</span>
                </label>
              </div>
            </div>

            <div class="col-12">
              <div id="paypalArea" class="paypal-box d-none">
                <div id="paypal-button-container"></div>
              </div>
            </div>

            <div class="col-12 d-flex gap-2 mt-2">
              <a th:href="@{/cart}" class="btn btn-secondary">Vissza a kosárba</a>
              <button type="submit" id="placeOrderBtn" class="btn btn-success">Rendelés leadása</button>
            </div>
          </div>
        </div>
      </form>
    </div>

    <div class="col-lg-5">
      <div class="card shadow-sm summary-card">
        <div class="card-body">
          <h4 class="mb-3">Összegzés</h4>

          <div class="d-flex justify-content-between mb-2">
            <span>Tételek száma</span>
            <strong th:text="${count}">0</strong>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <span>Fizetendő</span>
            <strong th:text="${total} + ' Ft'">0 Ft</strong>
          </div>

          <hr>

          <div class="small text-muted">
            PayPal online fizetés választása után megjelenik a gomb.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  const checkoutForm = document.getElementById('checkoutForm');
  const addressWrap = document.getElementById('addressWrap');
  const addressField = document.getElementById('addressField');
  const phoneField = document.getElementById('phoneField');
  const emailField = document.getElementById('emailField');
  const phoneLiveError = document.getElementById('phoneLiveError');
  const emailLiveError = document.getElementById('emailLiveError');
  const addressLiveError = document.getElementById('addressLiveError');
  const paypalArea = document.getElementById('paypalArea');
  const placeOrderBtn = document.getElementById('placeOrderBtn');

  let paypalRendered = false;
  let paypalRenderScheduled = false;
  const touched = { phone: false, email: false, address: false };

  function selectedDelivery() {
    return document.querySelector('input[name="deliveryType"]:checked')?.value;
  }

  function selectedPayment() {
    return document.querySelector('input[name="paymentMethod"]:checked')?.value;
  }

  function formToObject() {
    return Object.fromEntries(new FormData(checkoutForm).entries());
  }

  function groupDigits(digits) {
    if (digits.length <= 2) return digits;
    if (digits.length <= 5) return digits.slice(0, 2) + ' ' + digits.slice(2);
    return digits.slice(0, 2) + ' ' + digits.slice(2, 5) + ' ' + digits.slice(5, 9);
  }

  function formatPhone(raw) {
    let value = (raw || '').replace(/[^\d+]/g, '');

    if (value.startsWith('+36')) {
      const digits = value.slice(3).replace(/\D/g, '').slice(0, 9);
      return digits.length ? '+36 ' + groupDigits(digits) : '+36';
    }

    if (value.startsWith('06')) {
      const digits = value.slice(2).replace(/\D/g, '').slice(0, 9);
      return digits.length ? '06 ' + groupDigits(digits) : '06';
    }

    return value;
  }

  function validatePhoneLive() {
    const value = phoneField.value.trim();
    const normalized = value.replace(/[\s-]/g, '');
    const ok = /^(?:\+36|06)\d{9}$/.test(normalized);

    phoneField.classList.remove('is-valid', 'is-invalid');

    if (!value) {
      phoneLiveError.textContent = touched.phone ? 'A telefonszám kötelező.' : '';
      if (touched.phone) phoneField.classList.add('is-invalid');
      return false;
    }

    if (!ok) {
      phoneLiveError.textContent = 'Helyes formátum: +36 70 564 8321 vagy 06 70 564 8321';
      phoneField.classList.add('is-invalid');
      return false;
    }

    phoneLiveError.textContent = '';
    phoneField.classList.add('is-valid');
    return true;
  }

  function validateEmailLive() {
    const value = emailField.value.trim();
    const ok = emailField.validity.valid;

    emailField.classList.remove('is-valid', 'is-invalid');

    if (!value) {
      emailLiveError.textContent = touched.email ? 'Az email cím kötelező.' : '';
      if (touched.email) emailField.classList.add('is-invalid');
      return false;
    }

    if (!ok) {
      emailLiveError.textContent = 'Az email cím formátuma érvénytelen. Példa: test@gmail.com';
      emailField.classList.add('is-invalid');
      return false;
    }

    emailLiveError.textContent = '';
    emailField.classList.add('is-valid');
    return true;
  }

  function validateAddressLive() {
    if (selectedDelivery() !== 'DELIVERY') {
      addressLiveError.textContent = '';
      addressField?.classList.remove('is-invalid', 'is-valid');
      return true;
    }

    const value = addressField.value.trim();
    const ok = /^\d{4}\s+.+$/.test(value);

    addressField.classList.remove('is-valid', 'is-invalid');

    if (!value) {
      addressLiveError.textContent = touched.address ? 'A szállítási cím kötelező.' : '';
      if (touched.address) addressField.classList.add('is-invalid');
      return false;
    }

    if (!ok) {
      addressLiveError.textContent = 'A cím formátuma: irányítószám, város, utca, házszám. Példa: 1234 Budapest, Fő utca 1.';
      addressField.classList.add('is-invalid');
      return false;
    }

    addressLiveError.textContent = '';
    addressField.classList.add('is-valid');
    return true;
  }

  function renderPaypalButtons() {
    if (paypalRendered) return;

    if (!window.paypal || !window.paypal.Buttons) {
      if (!paypalRenderScheduled) {
        paypalRenderScheduled = true;
        setTimeout(() => {
          paypalRenderScheduled = false;
          renderPaypalButtons();
        }, 250);
      }
      return;
    }

    const container = document.getElementById('paypal-button-container');
    if (!container) return;

    container.innerHTML = '';

    window.paypal.Buttons({
      createOrder: () => {
        return fetch('/checkout/paypal/create-order', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-TOKEN': /*[[${_csrf.token}]]*/ ''
          },
          body: JSON.stringify(formToObject())
        }).then(async res => {
          if (!res.ok) {
            throw new Error(await res.text());
          }
          return res.json();
        }).then(data => data.orderID);
      },
      onApprove: (data) => {
        return fetch('/checkout/paypal/capture-order', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-TOKEN': /*[[${_csrf.token}]]*/ ''
          },
          body: JSON.stringify({ orderID: data.orderID })
        }).then(async res => {
          if (!res.ok) {
            throw new Error(await res.text());
          }
          return res.json();
        }).then(data => {
          window.location.href = data.redirectUrl;
        });
      },
      onError: (err) => {
        alert('PayPal hiba történt: ' + (err?.message || 'ismeretlen hiba'));
      }
    }).render('#paypal-button-container').then(() => {
      paypalRendered = true;
    }).catch(err => {
      paypalRendered = false;
      console.error('PayPal render error:', err);
    });
  }

  function refreshCheckoutUI() {
    addressWrap.style.display = selectedDelivery() === 'DELIVERY' ? 'block' : 'none';

    if (selectedPayment() === 'PAYPAL') {
      paypalArea.classList.remove('d-none');
      placeOrderBtn.classList.add('d-none');
      renderPaypalButtons();
    } else {
      paypalArea.classList.add('d-none');
      placeOrderBtn.classList.remove('d-none');
    }
  }

  phoneField.addEventListener('focus', () => {
    touched.phone = true;
  });

  phoneField.addEventListener('input', () => {
    touched.phone = true;
    const cursorAtEnd = phoneField.selectionStart === phoneField.value.length;
    phoneField.value = formatPhone(phoneField.value);
    if (cursorAtEnd) phoneField.setSelectionRange(phoneField.value.length, phoneField.value.length);
    validatePhoneLive();
  });

  phoneField.addEventListener('blur', () => {
    touched.phone = true;
    phoneField.value = formatPhone(phoneField.value);
    validatePhoneLive();
  });

  emailField.addEventListener('focus', () => {
    touched.email = true;
  });

  emailField.addEventListener('input', () => {
    touched.email = true;
    validateEmailLive();
  });

  emailField.addEventListener('blur', () => {
    touched.email = true;
    validateEmailLive();
  });

  addressField?.addEventListener('focus', () => {
    touched.address = true;
  });

  addressField?.addEventListener('input', () => {
    touched.address = true;
    validateAddressLive();
  });

  addressField?.addEventListener('blur', () => {
    touched.address = true;
    validateAddressLive();
  });

  document.querySelectorAll('input[name="deliveryType"], input[name="paymentMethod"]').forEach(el => {
    el.addEventListener('change', () => {
      refreshCheckoutUI();
      validateAddressLive();
    });
  });

  checkoutForm.addEventListener('submit', (e) => {
    const phoneOk = validatePhoneLive();
    const emailOk = validateEmailLive();
    const addressOk = validateAddressLive();

    if (!phoneOk || !emailOk || !addressOk) {
      e.preventDefault();
      return;
    }
  });

  window.addEventListener('load', () => {
    refreshCheckoutUI();
    validatePhoneLive();
    validateEmailLive();
    validateAddressLive();
  });
</script>

<script th:if="${paypalClientId != null and !#strings.isEmpty(paypalClientId)}"
        th:src="|https://www.paypal.com/sdk/js?client-id=${paypalClientId}&amp;currency=${paypalCurrency}&amp;intent=capture&amp;components=buttons|">
</script>
</body>
</html>
