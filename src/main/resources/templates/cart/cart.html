<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Kosár</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f7f7f7; }
    .cart-img {
      width: 96px;
      height: 76px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #ddd;
      background: #fff;
    }
    .qty-btn {
      width: 38px;
      height: 38px;
      padding: 0;
    }
    .cart-item-card {
      border-radius: 16px;
    }
  </style>
</head>
<body>
<div th:replace="fragments/header :: siteHeader"></div>

<div class="container py-4">
  <h1 class="mb-4">Kosár</h1>

  <div th:if="${#lists.isEmpty(items)}" class="alert alert-info">
    A kosár üres.
  </div>

  <div th:if="${!#lists.isEmpty(items)}">
    <div class="d-grid gap-3">
      <div class="card shadow-sm cart-item-card" th:each="item : ${items}">
        <div class="card-body">
          <div class="row align-items-center g-3">
            <div class="col-md-2 col-4">
              <img th:if="${item.imagePath != null and !#strings.isEmpty(item.imagePath)}"
                   th:src="@{${item.imagePath}}"
                   class="cart-img w-100"
                   alt="kép">

              <div th:if="${item.imagePath == null or #strings.isEmpty(item.imagePath)}"
                   class="cart-img w-100 d-flex align-items-center justify-content-center bg-light text-muted">
                Nincs kép
              </div>
            </div>

            <div class="col-md-4 col-8">
              <div class="fw-bold fs-5" th:text="${item.name}">Név</div>
              <div class="text-muted small mb-1"
     th:if="${item.categoryName != null and item.categoryName != 'Heti menü'}"
     th:text="${item.categoryName}">Kategória</div>
              <div class="small text-muted" 
     				th:if="${item.categoryName != null and item.categoryName == 'Heti menü'}"
     				th:utext="${item.description}">
			  </div>

				<div class="small text-muted" 
     				th:unless="${item.categoryName != null and item.categoryName == 'Heti menü'}"
     				th:text="${item.description}">
				</div>
            </div>

            <div class="col-md-2 col-6">
              <div class="text-muted small">Egységár</div>
              <div class="fw-semibold" th:text="${item.unitPrice} + ' Ft'">0 Ft</div>
            </div>

            <div class="col-md-2 col-6">
              <div class="text-muted small">Mennyiség</div>
              <div class="d-flex align-items-center gap-2">
                <form th:action="@{/cart/remove/{lineId}(lineId=${item.lineId})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                  <button class="btn btn-outline-secondary qty-btn" type="submit">-</button>
                </form>

                <span class="fw-bold fs-5" th:text="${item.quantity}">1</span>

                <form th:if="${item.menuItemId != null}" th:action="@{/cart/add/{id}(id=${item.menuItemId})}" method="post">
  					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
  					<button class="btn btn-outline-secondary qty-btn" type="submit">+</button>
				</form>

				<form th:if="${item.menuItemId == null}" th:action="@{/cart/add-line/{lineId}(lineId=${item.lineId})}" method="post">
  					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
  					<button class="btn btn-outline-secondary qty-btn" type="submit">+</button>
				</form>
              </div>
            </div>

            <div class="col-md-2 col-12 text-md-end">
              <div class="text-muted small">Sor összesen</div>
              <div class="fw-bold mb-3" th:text="${item.lineTotal} + ' Ft'">0 Ft</div>

              <form th:action="@{/cart/remove-all/{lineId}(lineId=${item.lineId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-outline-danger w-100" type="submit">Eltávolít</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm mt-4">
      <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div class="fs-4 fw-bold">
          Összesen: <span th:text="${total} + ' Ft'">0 Ft</span>
        </div>

        <div class="d-flex gap-2 flex-wrap">
          <a th:href="@{/menu}" class="btn btn-secondary">Vissza az étlapra</a>
          <a th:href="@{/checkout}" class="btn btn-success">Tovább a fizetéshez</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
