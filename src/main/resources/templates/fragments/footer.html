<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="siteFooter">
      <footer class="site-footer" role="contentinfo" aria-label="Oldal lábléc">
        <style>
          .site-footer {
              position: relative;
              width: 100%;
              max-width: 100%;
              margin-top: 80px;
              padding: 28px 0 24px;
              background:
                  linear-gradient(180deg, #fdf7f6 0%, #fbeceb 45%, #f6dbd7 100%);
              color: #2b2b2b;
              box-shadow:
                  0 -10px 22px rgba(224, 62, 45, 0.05);
              overflow: visible;
          }

          .site-footer__tear {
              position: absolute;
              left: 0;
              right: 0;
              top: -18px;
              height: 24px;
              pointer-events: none;
              z-index: 2;
              background: linear-gradient(180deg, #ffffff 0%, #f7f7f8 100%);
              clip-path: polygon(
                  0% 0%,
                  7% 2%,
                  14% 0%,
                  21% 5%,
                  29% 1%,
                  37% 7%,
                  45% 3%,
                  53% 8%,
                  60% 2%,
                  67% 6%,
                  75% 1%,
                  82% 7%,
                  89% 3%,
                  95% 6%,
                  100% 2%,
                  100% 54%,
                  96% 62%,
                  91% 48%,
                  86% 71%,
                  80% 55%,
                  74% 68%,
                  68% 46%,
                  62% 72%,
                  56% 52%,
                  49% 67%,
                  43% 45%,
                  36% 70%,
                  30% 50%,
                  24% 74%,
                  18% 47%,
                  12% 65%,
                  6% 51%,
                  0% 60%
              );
              box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
          }

          .footer-container {
              max-width: 1200px;
              margin: 0 auto;
              padding: 0 32px;
              display: flex;
              align-items: center;
              justify-content: space-between;
              gap: 20px;
              flex-wrap: wrap;
              box-sizing: border-box;
          }

          .footer-left {
              font-weight: 500;
              color: #2b2b2b;
          }

          .footer-right {
              display: flex;
              align-items: center;
              gap: 12px;
              flex-wrap: wrap;
              justify-content: flex-end;
          }

          .site-footer .footer-link {
              color: #111 !important;
              text-decoration: none !important;
              font-weight: 600;
              transition: color 0.2s ease, opacity 0.2s ease;
          }

          .site-footer .footer-link:hover {
              color: #c73324 !important;
              opacity: 0.85;
              text-decoration: underline !important;
              text-underline-offset: 3px;
          }

          .footer-separator {
              color: rgba(17, 17, 17, 0.45);
          }

          @media (max-width: 700px) {
              .footer-container {
                  flex-direction: column;
                  align-items: flex-start;
                  text-align: left;
                  gap: 10px;
                  padding: 0 20px;
              }

              .footer-right {
                  justify-content: flex-start;
              }

              .site-footer__tear {
                  top: -14px;
                  height: 21px;
                  clip-path: polygon(
                      0% 0%,
                      10% 1%,
                      18% 5%,
                      27% 2%,
                      36% 7%,
                      45% 3%,
                      54% 8%,
                      63% 2%,
                      71% 6%,
                      80% 1%,
                      89% 5%,
                      100% 2%,
                      100% 55%,
                      95% 63%,
                      88% 49%,
                      81% 70%,
                      74% 54%,
                      67% 68%,
                      60% 47%,
                      52% 72%,
                      45% 50%,
                      38% 69%,
                      31% 46%,
                      24% 67%,
                      17% 51%,
                      10% 65%,
                      0% 58%
                  );
              }
          }
        </style>

        <div class="site-footer__tear" aria-hidden="true"></div>

        <div class="footer-container">
          <div class="footer-left">
            Digital Dining © <span th:text="${#dates.format(#dates.createNow(),'yyyy')}"></span> - Minden jog fenntartva.
          </div>

          <div class="footer-right">
            <a th:href="@{/pdfs/adatkezelesi_tajekoztato.pdf}"
               target="_blank"
               rel="noopener noreferrer"
               class="footer-link">
              Adatkezelési tájékoztató
            </a>

            <span class="footer-separator">|</span>

            <a th:href="@{/pdfs/aszf.pdf}"
               target="_blank"
               rel="noopener noreferrer"
               class="footer-link">
              Általános szerződési feltételek
            </a>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
