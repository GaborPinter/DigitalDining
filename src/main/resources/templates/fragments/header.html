<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="siteHeader">
      <header class="site-header" role="banner" aria-label="Oldal fejléc">
        <style>
          .site-header {
            width: 100%;
            border-bottom: 1px solid #e6e6e6;
            background: #ffffff;
            box-sizing: border-box;
            color: #111;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.05);
          }

          .site-header .header-inner {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 8px;
          }

          .site-header .header-top {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4px 12px;
            box-sizing: border-box;
          }

          .site-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-self: center;
            text-decoration: none;
            color: #111;
          }

          .site-header .brand .name {
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 0.3px;
          }

          .site-header .opening {
            justify-self: start;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.02rem;
            color: #333;
            white-space: nowrap;
          }

          .site-header .top-right {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 12px;
          }

          .site-header .top-right .phone {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            white-space: nowrap;
            color: #333;
          }

          .site-header .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            padding: 8px;
            text-decoration: none;
            color: inherit;
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
          }

          .site-header .icon-btn:hover {
            background: linear-gradient(180deg, #ffd9d6 0%, #f6b8b3 100%);
            box-shadow: 0 2px 8px rgba(196, 51, 36, 0.18);
            transform: translateY(-1px);
          }

          .site-header .icon-lg {
            width: 38px;
            height: 38px;
          }

          .site-header .icon-med {
            width: 26px;
            height: 26px;
          }

          .site-header .header-bottom {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px 12px 8px 12px;
            box-sizing: border-box;
          }

          .site-header .main-nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 0;
          }

          .site-header .main-nav li {
            flex: 1;
            text-align: center;
          }

          .site-header .main-nav a {
            display: inline-block;
            width: 100%;
            padding: 8px 6px;
            text-decoration: none;
            color: #000;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 10px;
            transition: background-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
          }

          .site-header .main-nav a:hover {
            background: linear-gradient(180deg, #ffd9d6 0%, #f6b8b3 100%);
            color: #000;
            box-shadow: 0 2px 8px rgba(196, 51, 36, 0.18);
            transform: translateY(-1px);
          }

          .site-header .profile-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border-radius: 999px;
            padding: 7px 12px 7px 8px;
            text-decoration: none;
            color: #111;
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
          }

          .site-header .profile-pill:hover {
            background: linear-gradient(180deg, #ffd9d6 0%, #f6b8b3 100%);
            color: #000;
            box-shadow: 0 2px 8px rgba(196, 51, 36, 0.18);
            transform: translateY(-1px);
          }

          .site-header .profile-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #d62f20;
            color: #fff;
            font-weight: 800;
            font-size: 0.95rem;
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12);
          }

          .site-header .profile-avatar--loggedin {
            background: linear-gradient(180deg, #f04f43 0%, #b81f14 100%);
          }

          .site-header .profile-label {
            font-weight: 700;
            font-size: 0.98rem;
            white-space: nowrap;
          }

          @media (max-width: 920px) {
            .site-header .header-top {
              grid-template-columns: 1fr;
              gap: 10px;
              padding: 8px 12px;
            }

            .site-header .opening {
              justify-self: start;
              font-size: 1rem;
              white-space: normal;
            }

            .site-header .brand {
              justify-self: start;
            }

            .site-header .top-right {
              justify-self: start;
              gap: 8px;
              flex-wrap: wrap;
            }

            .site-header .main-nav ul {
              flex-wrap: wrap;
            }

            .site-header .main-nav li {
              flex-basis: 50%;
            }
          }
        </style>

        <div class="header-inner">
          <div class="header-top">
            <div class="opening" title="Nyitvatartás">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 1.75a10.25 10.25 0 1 0 0 20.5A10.25 10.25 0 0 0 12 1.75zm0 18.5a8.25 8.25 0 1 1 0-16.5 8.25 8.25 0 0 1 0 16.5z" fill="#333"/>
                <path d="M12.75 6.5h-1.5v6l5 3 .75-1.23-4.25-2.27V6.5z" fill="#333"/>
              </svg>
              <span>Nyitvatartás: H-Cs, V: 10:00-19:45 · P-Szo: 11:00-20:30</span>
            </div>

            <a th:href="@{/}" class="brand" aria-label="Főoldal">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <path d="M5 2c.55 0 1 .45 1 1v6h1V3a1 1 0 0 1 2 0v6h1V3a1 1 0 0 1 2 0v7a3 3 0 0 1-3 3h-1v8a1 1 0 1 1-2 0v-8H5a3 3 0 0 1-3-3V3a1 1 0 0 1 2 0v6h1V3c0-.55.45-1 1-1z" fill="#333"/>
                <path d="M17 2c.55 0 1 .45 1 1v8h2V3a1 1 0 0 1 2 0v9a4 4 0 0 1-4 4h-1v6a1 1 0 1 1-2 0V3c0-.55.45-1 1-1z" fill="#333"/>
              </svg>
              <span class="name" th:text="${restaurantName != null ? restaurantName : 'Digital Dining'}">Digital Dining</span>
            </a>

					<div class="top-right" role="navigation" aria-label="Segédlinkek">
						<div class="phone" title="Rendeléshez">
							<svg class="icon-med" width="26" height="26" viewBox="0 0 24 24"
								fill="none" aria-hidden="true">
                  <path
									d="M6.6 10.8a15.05 15.05 0 0 0 6.6 6.6l1.9-1.9a1 1 0 0 1 1.04-.24c1.12.37 2.33.57 3.57.57a1 1 0 0 1 1 1v3.5a1 1 0 0 1-1 1C10.02 21 3 13.98 3 4.5A1 1 0 0 1 4 3.5H7.5a1 1 0 0 1 1 1c0 1.24.2 2.45.57 3.57a1 1 0 0 1-.24 1.04l-1.23 1.23z"
									fill="#333" />
                </svg>
							<a th:href="'tel:' + '+36300863460'" href="tel:+36300863460"
								style="text-decoration: none; color: inherit;">Rendeléshez:
								<strong>+36 30 086 3460</strong>
							</a>
						</div>

						<a th:href="@{/cart}" class="icon-btn position-relative" title="Kosár" aria-label="Kosár">
  							<svg class="icon-lg" width="38" height="38" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    						<path d="M7 4h-2l-1 2h2l2.6 6.59-1.35 2.45A1 1 0 0 0 7 16h10v-2H8.42l.6-1.09L17 6H7z" fill="#333" />
    						<circle cx="10" cy="20" r="1.6" fill="#333"></circle>
    						<circle cx="17" cy="20" r="1.6" fill="#333"></circle>
  						</svg>

  						<span th:if="${cartCount > 0}"
        					class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
        					th:text="${cartCount}">0</span>
						</a>

						<a th:if="${currentUser == null}" th:href="@{/auth/login}"
							class="profile-pill" title="Bejelentkezés"> <span
							class="profile-avatar" aria-hidden="true"> <svg width="18"
									height="18" viewBox="0 0 24 24" fill="none">
      <path
										d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"
										fill="#fff" />
    </svg>
						</span> <span class="profile-label">Belépés</span>
						</a> <a th:if="${currentUser != null}" th:href="@{/profile}"
							class="profile-pill" title="Profil"> <span
							class="profile-avatar profile-avatar--loggedin"
							th:text="${#strings.substring(currentUser.username, 0, 1).toUpperCase()}">U</span>
							<span class="profile-label" th:text="${currentUser.username}">Felhasználó</span>
						</a>
					</div>
				</div>

          <div class="header-bottom" role="navigation" aria-label="Fő navigáció">
            <nav class="main-nav">
              <ul>
                <li><a th:href="@{/}">Főoldal</a></li>
                <li><a th:href="@{/about}">Rólunk</a></li>
                <li><a th:href="@{/menu}">Étlap/Itallap</a></li>
                <li><a th:href="@{/weekly-menu}">Heti menü</a></li>
                <li><a th:href="@{/contact}">Kapcsolat</a></li>
                <li><a th:href="@{/faq}">Kérdések</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </header>
    </div>
  </body>
</html>
